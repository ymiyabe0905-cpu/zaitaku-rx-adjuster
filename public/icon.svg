<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" shape-rendering="crispEdges">
  <!-- 背景（青空・角丸ブロック） -->
  <rect x="8" y="8" width="496" height="496" rx="48" fill="#4a90e8"/>
  <!-- 雲 -->
  <g fill="#ffffff">
    <rect x="70" y="120" width="120" height="22" rx="11"/>
    <rect x="92" y="100" width="60" height="22" rx="11"/>
    <rect x="408" y="240" width="84" height="18" rx="9"/>
    <rect x="424" y="226" width="44" height="18" rx="9"/>
  </g>
  <!-- コイン（右上の太陽風） -->
  <circle cx="412" cy="120" r="44" fill="#f5c518" stroke="#b87d12" stroke-width="10"/>
  <circle cx="400" cy="108" r="14" fill="#ffe98a"/>
  <!-- 接地影 -->
  <rect x="120" y="408" width="280" height="22" rx="11" fill="#3f7fd1"/>
  <!-- カレンダー -->
  <!-- リング -->
  <rect x="172" y="120" width="26" height="56" rx="6" fill="#cfcfcf" stroke="#1a1a2e" stroke-width="8"/>
  <rect x="306" y="120" width="26" height="56" rx="6" fill="#cfcfcf" stroke="#1a1a2e" stroke-width="8"/>
  <!-- 本体 -->
  <rect x="104" y="150" width="252" height="252" rx="8" fill="#ffffff" stroke="#1a1a2e" stroke-width="12"/>
  <!-- 上部オレンジ帯 -->
  <path d="M110 158 h240 v54 h-240 z" fill="#e08a2e"/>
  <rect x="104" y="150" width="252" height="64" rx="8" fill="none" stroke="#1a1a2e" stroke-width="12"/>
  <!-- グリッド（薄い青の日付マス 4x3） -->
  <g fill="#aacbf5">
    <rect x="132" y="236" width="34" height="34"/>
    <rect x="182" y="236" width="34" height="34"/>
    <rect x="232" y="236" width="34" height="34"/>
    <rect x="282" y="236" width="34" height="34"/>
    <rect x="132" y="286" width="34" height="34"/>
    <rect x="182" y="286" width="34" height="34"/>
    <rect x="232" y="286" width="34" height="34"/>
    <rect x="282" y="286" width="34" height="34"/>
    <rect x="132" y="336" width="34" height="34"/>
    <rect x="182" y="336" width="34" height="34"/>
    <rect x="232" y="336" width="34" height="34"/>
    <rect x="282" y="336" width="34" height="34"/>
  </g>
  <!-- カプセル（赤×白・斜め） -->
  <g transform="translate(330 330) rotate(-35)">
    <rect x="-104" y="-40" width="208" height="80" rx="40" fill="#1a1a2e"/>
    <rect x="-96" y="-32" width="120" height="64" rx="32" fill="#d83a2a"/>
    <rect x="8" y="-32" width="88" height="64" rx="32" fill="#f4f4f4"/>
    <rect x="-70" y="-20" width="44" height="12" rx="6" fill="#ffffff" opacity="0.85"/>
  </g>
  <!-- 錠剤（白い丸・割線） -->
  <circle cx="430" cy="416" r="50" fill="#f4f4f4" stroke="#1a1a2e" stroke-width="10"/>
  <line x1="402" y1="444" x2="458" y2="388" stroke="#c2c2c2" stroke-width="8"/>
</svg>
